<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{% block title %}PulseHR{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --ink:#0f0f14;--surface:#17171f;--card:#1e1e2a;--card2:#252535;
  --border:#2a2a38;--accent:#6c63ff;--accent2:#ff6584;--accent3:#43e97b;
  --accent4:#f7b731;--text:#e8e8f0;--muted:#7a7a9a;
}
*{margin:0;padding:0;box-sizing:border-box}
html, body { height: 100%; width: 100%; overflow: hidden; }

/* ═══════════════════════════════════════════════════════
   REBUILT MOBILE-FIRST LAYOUT
   ═══════════════════════════════════════════════════════ */

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

.app-container {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.sidebar {
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 2000;
  transform: translateX(0);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
}

.main-content {
  flex: 1;
  margin-left: 260px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* --- Mobile Breakpoint (< 992px) --- */
@media (max-width: 991.98px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.show {
    transform: translateX(0);
    box-shadow: 10px 0 40px rgba(0,0,0,0.5);
  }
  .main-content {
    margin-left: 0;
  }
  .menu-toggle { display: flex !important; }
  .sidebar-close { display: block !important; }
}

/* --- Desktop Breakpoint (> 992px) --- */
@media (min-width: 992px) {
  .menu-toggle, .sidebar-close, .sidebar-overlay { display: none !important; }
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1900;
}
.sidebar-overlay.show { display: block; }

/* --- Topbar --- */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 1000;
}
.menu-toggle { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 38px; height: 38px; border-radius: 8px; align-items: center; justify-content: center; cursor: pointer; }
.topbar h1 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.2rem; margin:0; }

/* --- Page Content --- */
.page-content { padding: 1.5rem; }
@media (max-width: 768px) { .page-content { padding: 1rem; } }

/* --- Sidebar Internals --- */
.sidebar-brand { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-brand .logo { width:38px; height:38px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.sidebar-brand h2 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:0; }
.sidebar-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }
.sidebar-nav { flex:1; overflow-y:auto; padding:1rem 0; }
.nav-item { display:flex; align-items:center; gap:.75rem; padding:.65rem 1.2rem; color:var(--muted); text-decoration:none; font-size:.88rem; font-weight:500; cursor:pointer; border-left:3px solid transparent; margin:.1rem .5rem; border-radius:0 8px 8px 0; }
.nav-item.active { background:rgba(108,99,255,.12); color:var(--accent); border-left-color:var(--accent); }
.sidebar-footer { padding:1rem; border-top:1px solid var(--border); }

/* --- Error Display --- */
#critical-error-display { display: none; position: fixed; top: 1rem; left: 1rem; right: 1rem; background: #6e1616; color: white; border: 2px solid var(--accent2); border-radius: 12px; padding: 1rem; z-index: 10000; font-family: monospace; font-size: 0.8rem; }
#critical-error-display h5 { margin-bottom: 0.5rem; }

</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<div id="critical-error-display"></div>
<div class="app-container">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <div class="logo"><i class="fas fa-brain"></i></div>
        <h2>PulseHR</h2>
      </div>
      <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      {% block sidebar_nav %}{% endblock %}
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" style="background:var(--card);border-radius:10px;padding:.75rem;display:flex;align-items:center;gap:.75rem;">
        <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;">{{ user.name[0] | upper }}</div>
        <div>
          <p style="font-weight:600;font-size:.85rem;margin:0;">{{ user.name }}</p>
          <span style="font-size:.75rem;color:var(--muted);">{{ user.role | title }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="menu-toggle" onclick="toggleSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <h1 id="pageTitle">{% block page_title %}Dashboard{% endblock %}</h1>
      </div>
      <a href="/logout" style="color:var(--accent2);text-decoration:none;display:flex;align-items:center;gap:.5rem;">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </a>
    </div>
    <div class="page-content" id="pageContent">
      <div id="loadingIndicator" style="text-align:center;padding:3rem 0;">
        <div class="spinner-border text-primary" role="status"></div>
        <p style="color:var(--muted);margin-top:1rem;">Loading Dashboard...</p>
      </div>
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<script>
// --- REBUILT CORE SCRIPT --- 

// Global Error Catcher
window.onerror = function(message, source, lineno, colno, error) {
  const errDisp = document.getElementById('critical-error-display');
  if (errDisp) {
    errDisp.style.display = 'block';
    errDisp.innerHTML = `<h5>Critical Mobile Error</h5><p>${message}</p><p>At: ${source.split('/').pop()}:${lineno}</p>`;
  }
  const loader = document.getElementById('loadingIndicator');
  if (loader) loader.style.display = 'none';
  return true; // Prevents default browser error handling
};

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const isVisible = sidebar.classList.toggle('show');
  overlay.classList.toggle('show');
  // Lock body scroll on mobile when sidebar is open
  document.body.style.overflow = isVisible ? 'hidden' : 'auto';
}

// Force all dashboard logic to run AFTER the page is fully loaded
function runWhenReady(fn) {
  if (document.readyState === 'complete') {
    fn();
  } else {
    window.addEventListener('load', fn);
  }
}

// Simplified navigation
function navigate(section) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.querySelector(`[data-section="${section}"]`);
  if (el) el.classList.add('active');
  if (window.loadSection) window.loadSection(section);
  try { sessionStorage.setItem('lastSection_' + window.location.pathname, section); } catch(e) {}
}

// Modal & UI Utilities
function showModal(id) { document.getElementById(id).style.display = 'flex'; }
function hideModal(id) { document.getElementById(id).style.display = 'none'; }

function createChart(id, type, labels, datasets, options={}) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (ctx._chart) ctx._chart.destroy();
  const defaults = {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#7a7a9a',font:{size:11}}}},
    scales: type !== 'pie' && type !== 'doughnut' ? {
      x:{ticks:{color:'#7a7a9a',font:{size:10}},grid:{color:'#2a2a38'}},
      y:{ticks:{color:'#7a7a9a',font:{size:10}},grid:{color:'#2a2a38'}}
    } : {}
  };
  ctx._chart = new Chart(ctx, {type, data:{labels, datasets}, options:{...defaults, ...options}});
}

function showToast(title, msg, type='success') {
  alert(title + ": " + msg); // Fallback for mobile until complex toast is rebuilt
}

window.pulsePrompt = (title, label, def, cb) => {
  const val = prompt(title + "\n" + label, def);
  if (val !== null) cb(val);
};

window.pulseConfirm = (title, msg, cb) => {
  if (confirm(title + "\n" + msg)) cb();
};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);
  
  // Safety timeout: If nothing loads after 5s, show error
  setTimeout(() => {
    const loader = document.getElementById('loadingIndicator');
    if (loader && loader.style.display !== 'none') {
      loader.style.display = 'none';
      const content = document.getElementById('pageContent');
      if (!content.querySelector('.panel')) { // Check if content is empty
        content.innerHTML = `<div style="text-align:center;padding:2rem;background:var(--card);border-radius:12px;"><h5>Dashboard Timed Out</h5><p>Your connection may be too slow.</p><button onclick="location.reload()">Retry</button></div>`;
      }
    }
  }, 5000);
});

</script>
{% block scripts %}{% endblock %}
</body>
</html>
