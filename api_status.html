<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Status — PulseHR</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ink: #0f0f14;
            --surface: #17171f;
            --card: #1e1e2a;
            --border: #2a2a38;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --accent3: #43e97b;
            --text: #e8e8f0;
            --muted: #7a7a9a;
        }
        body {
            background: var(--ink);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }
        .status-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .pulse-icon {
            font-size: 3.5rem;
            color: var(--accent3);
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            margin: 0 0 0.5rem;
            font-size: 2.2rem;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(67, 233, 123, 0.1);
            color: var(--accent3);
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .services {
            text-align: left;
            margin-top: 2rem;
        }
        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .service-item:last-child { border: none; }
        .service-name { font-weight: 500; }
        .service-status { color: var(--accent3); font-size: 0.85rem; font-weight: 700; }
        .btn {
            margin-top: 2.5rem;
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #5a52d5);
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div class="pulse-icon"><i class="fas fa-check-circle"></i></div>
            <h1>System Status</h1>
            <div class="status-badge">
                <i class="fas fa-circle" style="font-size: 0.6rem;"></i> All Systems Operational
            </div>
            
            <div class="services">
                <div class="service-item">
                    <span class="service-name">PulseHR Core API</span>
                    <span class="service-status">Operational</span>
                </div>
                <div class="service-item">
                    <span class="service-name">AI Performance Predictor</span>
                    <span class="service-status">Operational</span>
                </div>
                <div class="service-item">
                    <span class="service-name">ATS Resume Analyzer</span>
                    <span class="service-status">Operational</span>
                </div>
                <div class="service-item">
                    <span class="service-name">Database Connectivity</span>
                    <span class="service-status">Operational</span>
                </div>
            </div>

            <a href="/landing" class="btn">Back to Home</a>
        </div>
    </div>
</body>
</html>
